<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Factory — Giriş</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1c3f;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .wrap { display: flex; width: 860px; min-height: 480px; border-radius: 20px; overflow: hidden; border: 1px solid #1e3a6e; }
    .left {
      flex: 1; background: #0a1530;
      padding: 52px 44px;
      display: flex; flex-direction: column; justify-content: center;
    }
    .logo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
    .logo { width: 40px; height: 40px; background: #2563eb; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .logo svg { width: 22px; height: 22px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; }
    .brand { font-size: 18px; font-weight: 700; color: #f1f5f9; }
    .brand span { color: #60a5fa; }
    h2 { font-size: 26px; font-weight: 700; color: #f1f5f9; margin-bottom: 6px; }
    .sub { font-size: 14px; color: #475569; margin-bottom: 32px; }
    label { display: block; font-size: 12px; font-weight: 500; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    input {
      width: 100%; padding: 11px 14px;
      background: #0f1c3f; border: 1px solid #1e3a6e;
      border-radius: 8px; font-size: 14px; color: #e2e8f0;
      outline: none; margin-bottom: 16px; transition: border-color 0.15s;
    }
    input:focus { border-color: #2563eb; }
    input::placeholder { color: #334155; }
    button {
      width: 100%; padding: 12px;
      background: #2563eb; color: #fff;
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #1d4ed8; }
    #error { font-size: 13px; color: #f87171; margin-top: 10px; min-height: 18px; text-align: center; }
    .right {
      width: 340px; background: #2563eb;
      padding: 52px 36px;
      display: flex; flex-direction: column; justify-content: center;
    }
    .right h3 { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 12px; }
    .right p { font-size: 13px; color: #bfdbfe; line-height: 1.7; margin-bottom: 28px; }
    .feature { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .feature-dot { width: 8px; height: 8px; border-radius: 50%; background: #60a5fa; flex-shrink: 0; }
    .feature span { font-size: 13px; color: #dbeafe; }
    @media (max-width: 700px) { .wrap { flex-direction: column; width: 95%; } .right { width: 100%; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="left">
      <div class="logo-row">
        <div class="logo">
          <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="8" y1="13" x2="8" y2="17"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="16" y1="14" x2="16" y2="17"/></svg>
        </div>
        <span class="brand">Visual <span>Factory</span></span>
      </div>
      <h2>Hoş geldiniz</h2>
      <p class="sub">Devam etmek için giriş yapın</p>
      <label for="username">Kullanıcı adı</label>
      <input type="text" id="username" placeholder="admin" autocomplete="username">
      <label for="password">Şifre</label>
      <input type="password" id="password" placeholder="••••••" autocomplete="current-password">
      <button onclick="login()">Giriş yap</button>
      <p id="error"></p>
    </div>
    <div class="right">
      <h3>Fabrika izleme sistemi</h3>
      <p>Konveyör hattınızı gerçek zamanlı takip edin.</p>
      <div class="feature"><div class="feature-dot"></div><span>Canlı mesafe sensörü verisi</span></div>
      <div class="feature"><div class="feature-dot"></div><span>Ürün sayımı ve istatistik</span></div>
      <div class="feature"><div class="feature-dot"></div><span>5 saniyede bir otomatik güncelleme</span></div>
      <div class="feature"><div class="feature-dot"></div><span>Geçmiş kayıt ve raporlama</span></div>
      <div class="feature"><div class="feature-dot"></div><span>Admin yönetim paneli</span></div>
    </div>
  </div>
  <script>
    function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })
      .then(r => r.json())
      .then(d => {
        if (d.ok) {
          sessionStorage.setItem('loggedIn', '1');
          window.location.href = 'dashboard.html';
        } else {
          document.getElementById('error').textContent = 'Kullanıcı adı veya şifre hatalı.';
        }
      });
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
